name: Collect Observatory Data

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        working-directory: collector
        run: npm run collect
        env:
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          SEC_EDGAR_USER_AGENT_EMAIL: ${{ secrets.SEC_EDGAR_USER_AGENT_EMAIL }}

      - name: Commit updated observatory.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collector/observatory.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(collector): update observatory.json"
            git push
          fi
